sonar.projectKey=Gabriel-Souza18_Alarm_Map
sonar.organization=gabriel-souza18

# Código-fonte e testes
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java,app/src/androidTest/java

# Binários Kotlin compilados (AGP >= 8 usa intermediates/built_in_kotlinc)
sonar.java.binaries=app/build/intermediates/built_in_kotlinc/debug/compileDebugKotlin/classes,app/build/tmp/kotlin-classes/debug

# Relatório de cobertura JaCoCo
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# Exclusões de análise
sonar.exclusions=**/R.class,**/R$*.class,**/BuildConfig.*,**/Manifest*.*
