name: SonarCloud analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para análise completa de histórico

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # Compila o projeto (necessário para gerar os .class usados pelo JaCoCo e Sonar)
      - name: Build debug
        run: ./gradlew assembleDebug

      # Roda os testes unitários e gera o relatório JaCoCo XML
      - name: Run tests and generate coverage report
        run: ./gradlew jacocoTestReport

      # Scanner do SonarCloud (action atual, substitui a deprecated sonarcloud-github-action)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}